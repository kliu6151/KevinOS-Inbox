<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0c0e">
<link rel="icon" href="data:,">
<title>KevinOS</title>
<style>
  /* Dispatch Board: flat asphalt ground, one safety-amber "now" signal,
     ui-monospace as the machine voice for dates/counts/amounts. No gradients,
     no glow, no decorative shadows — sunlight legibility over atmosphere. */
  :root{
    --bg:#0b0c0e; --panel:#141619; --panel2:#141619;
    --border:#24272d; --border2:#343941;
    --text:#edf1f7; --muted:#9aa5b5; --faint:#727d8e;
    --accent:#6aa9ff; --accent-soft:rgba(106,169,255,.12);
    --green:#3ecf8e; --green2:#3ecf8e; --red:#ff5d51; --amber:#ffb020;
    --amber-ink:#191204;
    --shadow:none;
    --shadow-sm:none;
    --radius:12px;
    --mono:ui-monospace,"Cascadia Mono","SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--text); min-height:100vh;
    padding:env(safe-area-inset-top) 0 calc(88px + env(safe-area-inset-bottom));
  }
  main{padding:12px 16px;max-width:660px;margin:0 auto}
  .view{display:none}
  .view.active{display:block;animation:rise .22s cubic-bezier(.2,.7,.3,1)}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  button{font-family:inherit;cursor:pointer}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}

  /* header */
  .top{display:flex;align-items:baseline;justify-content:space-between;padding:16px 2px 12px}
  .top h1{font-size:19px;font-weight:700;letter-spacing:-.01em}
  .top h1 span{color:var(--accent)}
  .top .sub{font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}

  /* capture */
  textarea{
    width:100%;min-height:42vh;background:var(--panel);color:var(--text);
    border:1px solid var(--border);border-radius:var(--radius);padding:16px;
    font-size:17px;line-height:1.55;resize:none;outline:none;
    box-shadow:var(--shadow-sm);transition:border-color .15s, box-shadow .2s;
  }
  textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft), var(--shadow-sm)}
  textarea::placeholder{color:var(--faint)}
  .btn{
    margin-top:14px;padding:16px;width:100%;color:#0b1a12;border:none;border-radius:12px;
    font-size:17px;font-weight:650;letter-spacing:.01em;
    background:var(--green);
    transition:transform .12s, filter .15s;
  }
  .btn:active{transform:scale(.98)}
  .btn:disabled{background:var(--panel);color:var(--muted);box-shadow:none;filter:none}
  #status{text-align:center;padding:10px;font-size:14px;color:var(--muted);min-height:38px}
  #status.ok{color:var(--green)} #status.err{color:var(--red)}
  .tiny{text-align:center;padding:8px 0}
  .tiny a{color:var(--faint);font-size:12px;text-decoration:none}

  /* sections & items */
  .sec{margin:22px 2px 8px;font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
  .card{
    background:var(--panel);
    border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;
  }
  /* status rail: every actionable row carries a colored left edge —
     amber = the Must Win (one per screen), green = done, red = overdue, none = queued */
  .item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px 14px 13px;border-bottom:1px solid var(--border);border-left:3px solid transparent;transition:background .12s}
  .item:last-child{border-bottom:none}
  .item.mw{border-left-color:var(--amber)}
  .item.mw:not(.done) .txt{font-size:17px}
  .item.late:not(.done){border-left-color:var(--red)}
  .box{
    flex:none;width:24px;height:24px;margin-top:1px;border:2px solid var(--border2);
    border-radius:6px;display:flex;align-items:center;justify-content:center;
    font-size:14px;color:transparent;transition:background .15s,border-color .15s,transform .15s;
  }
  .item.done{opacity:.6;border-left-color:var(--green)}
  .item.done .txt{text-decoration:line-through}
  .item.done .intent{display:none}
  .item.done .box{background:var(--green);border-color:var(--green);color:#0b1a12;transform:scale(1.05)}
  .txt{font-size:16px;line-height:1.45;flex:1;font-weight:600;letter-spacing:-.005em}
  .meta{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:4px}
  /* concept A: 44px checkbox hit area (visual box stays 24px) */
  .hit{flex:none;padding:10px;margin:-10px;display:flex}
  /* concept A: implementation intention under the task title, never truncated */
  .intent{font-size:14px;line-height:1.5;color:var(--muted);margin-top:4px}
  /* top-3 progress: the shift strip — segments fill amber, green when the day is cleared */
  .prog{display:flex;align-items:center;gap:10px;padding:4px 2px 0}
  .pdots{display:flex;gap:5px}
  .pdot{width:34px;height:6px;border-radius:2px;background:var(--border2)}
  .pdot.on{background:var(--amber)}
  .pdots.all .pdot.on{background:var(--green)}
  .pt{font-family:var(--mono);font-size:12.5px;color:var(--text);font-weight:650;letter-spacing:.05em}
  .ack{margin:10px 0 0;padding:12px 14px;border-radius:10px;font-size:14.5px;font-weight:600;
    color:var(--green);background:rgba(62,207,142,.08);border:1px solid rgba(62,207,142,.35)}
  /* first-move callout: quiet panel, attention only on the edge + label */
  .fm{margin-top:14px;padding:12px 14px;background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--amber);
    border-radius:0 10px 10px 0;font-size:15px;line-height:1.55}
  .fm b{color:var(--amber)}
  /* concept A: read-only rows in the full-plan fold (the interactive copies live above) */
  .ro{display:flex;gap:8px;padding:5px 0;font-size:14.5px;line-height:1.5}
  .ro.done{opacity:.5;text-decoration:line-through}
  .ro .glyph{flex:none;color:var(--faint)}
  .pri1{color:var(--red);font-weight:600}
  .today-badge{color:var(--accent);font-weight:600;font-family:var(--mono);font-size:11px;letter-spacing:.05em}
  .empty{padding:16px;color:var(--muted);font-size:14.5px;line-height:1.5}
  .subsec{padding:11px 14px 5px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);border-bottom:1px solid var(--border)}
  .subsec+.item{border-top:none}
  .more{
    display:block;width:100%;padding:13px 14px;background:none;border:none;border-top:1px solid var(--border);
    color:var(--accent);font-size:14px;font-weight:600;text-align:left;
  }
  .note{font-size:15px;line-height:1.6;padding:14px}
  .note .h1{font-weight:700;font-size:16px;margin:8px 0 4px}
  .note .h2{font-family:var(--mono);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:14px 0 4px}
  .note .bullet{padding-left:10px}
  .note .gap{height:8px}

  /* intel briefing stories */
  .intel{padding:15px 14px;border-bottom:1px solid var(--border)}
  .intel:last-child{border-bottom:none}
  .intel .ih{font-weight:700;font-size:15.5px;line-height:1.4}
  .intel .ib{font-size:14.5px;line-height:1.55;color:var(--muted);margin-top:6px}
  .intel .iw{font-size:14.5px;line-height:1.5;margin-top:9px;padding:9px 11px;background:var(--accent-soft);border-left:3px solid var(--accent);border-radius:0 10px 10px 0}
  .intel .iw b{color:var(--accent)}
  .intel .is{font-size:12px;color:var(--faint);margin-top:8px}
  .chips{display:flex;gap:8px;flex-wrap:wrap;padding:4px 0}
  .chip{background:var(--panel);border:1px solid var(--border);border-radius:999px;padding:7px 13px;font-size:12.5px}
  .chip b{font-family:var(--mono);color:var(--amber)}

  /* money ledger rows */
  .lwrap{flex:1;display:flex;gap:12px;align-items:flex-start;min-width:0}
  .lmain{flex:1;min-width:0}
  .ljob{font-family:var(--mono);color:var(--faint);font-size:11.5px;font-weight:600;margin-left:7px;white-space:nowrap}
  .lamt{text-align:right;flex:none}
  .amt{font-family:var(--mono);font-weight:700;font-size:15px;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .age{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:2px}
  .age.warn{color:var(--red);font-weight:600}

  /* collapsible fold */
  .fold{
    display:flex;align-items:center;gap:10px;width:100%;margin-top:14px;padding:13px 14px;
    background:var(--panel);color:var(--text);
    border:1px solid var(--border);border-radius:10px;font-size:15px;font-weight:600;text-align:left;
    transition:border-color .15s;
  }
  .fold .chev{width:16px;height:16px;flex:none;stroke:var(--muted);transition:transform .18s}
  .fold.open .chev{transform:rotate(90deg)}
  .fold .ft{flex:1}
  .fold .fc{font-family:var(--mono);color:var(--muted);font-weight:500;font-size:11.5px;letter-spacing:.03em}
  .fold .fw{font-family:var(--mono);color:var(--red);font-weight:600;font-size:11.5px}
  .foldcard{margin-top:6px}

  /* month calendar */
  .cal-head{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 12px}
  .cal-head .mon{font-size:17px;font-weight:700;letter-spacing:-.01em}
  .cal-head button{
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:12px;width:44px;height:40px;font-size:18px;box-shadow:var(--shadow-sm);
    transition:transform .12s, border-color .15s;
  }
  .cal-head button:active{transform:scale(.94)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .dow{text-align:center;font-size:11px;color:var(--faint);font-weight:700;padding:4px 0}
  .cal-cell{
    aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;font-size:15px;color:var(--text);
    background:transparent;border:1px solid transparent;position:relative;
    transition:background .12s,border-color .12s;
  }
  .cal-cell.dim{color:var(--faint)}
  .cal-cell.today{border-color:var(--accent);font-weight:700}
  .cal-cell.sel{background:var(--accent-soft);border-color:var(--accent)}
  .cal-cell .dot{width:5px;height:5px;border-radius:50%;background:var(--amber);position:absolute;bottom:6px}
  .cal-cell.past-due .dot{background:var(--red)}
  .day-title{margin:18px 2px 8px;font-size:14px;font-weight:700}

  /* detail sheet */
  #sheet-ov{
    position:fixed;inset:0;background:rgba(4,6,10,.68);z-index:50;
    display:flex;align-items:flex-end;backdrop-filter:blur(4px);
  }
  #sheet-ov[hidden]{display:none}
  #sheet{
    width:100%;background:linear-gradient(180deg,var(--panel),var(--panel2));
    border-radius:22px 22px 0 0;border-top:1px solid var(--border2);
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));
    max-height:75vh;overflow-y:auto;box-shadow:0 -12px 48px rgba(0,0,0,.5);
    animation:sheetUp .28s cubic-bezier(.2,.8,.25,1);
  }
  @keyframes sheetUp{from{transform:translateY(48px);opacity:.5}to{transform:none;opacity:1}}
  #sheet .grab{width:40px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 16px}
  #sheet-title{font-size:19px;font-weight:700;line-height:1.35;margin-bottom:14px;letter-spacing:-.01em}
  .srow{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:15px}
  .srow .k{color:var(--muted);flex:none;min-width:92px}
  .btn2{
    margin-top:10px;padding:15px;width:100%;background:var(--panel);color:var(--text);
    border:1px solid var(--border);border-radius:14px;font-size:16px;font-weight:600;
    box-shadow:var(--shadow-sm);transition:transform .12s,border-color .15s;
  }
  .btn2:active{transform:scale(.98)}

  /* bottom nav (mobile) */
  nav{
    position:fixed;bottom:0;left:0;right:0;display:flex;z-index:40;
    background:rgba(11,14,20,.92);border-top:1px solid var(--border);
    padding-bottom:max(env(safe-area-inset-bottom),12px);backdrop-filter:blur(14px);
  }
  nav .brand{display:none}
  nav button{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:11px 0 6px;background:none;border:none;position:relative;
    color:var(--muted);font-size:12px;font-weight:600;
    transition:color .15s;
  }
  nav button svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  nav button.on{color:var(--amber)}
  .loading{padding:24px;text-align:center;color:var(--muted);font-size:14px}
  .skelrow{height:14px;border-radius:7px;margin:16px 14px;background:linear-gradient(90deg,var(--panel2) 25%,var(--border) 50%,var(--panel2) 75%);background-size:200% 100%;animation:shim 1.2s linear infinite}
  @keyframes shim{from{background-position:200% 0}to{background-position:-200% 0}}
  .stale{
    margin:0 0 10px;padding:10px 13px;border-radius:12px;font-size:13.5px;font-weight:600;
    color:var(--amber);background:rgba(224,163,62,.1);border:1px solid rgba(224,163,62,.3);
  }
  .nbadge{
    position:absolute;top:5px;left:calc(50% + 7px);min-width:17px;height:17px;padding:0 5px;
    display:flex;align-items:center;justify-content:center;border-radius:9px;
    background:var(--amber);color:var(--amber-ink);font-family:var(--mono);font-size:10.5px;font-weight:700;line-height:1;
  }

  /* desktop: left rail + hover states */
  @media (min-width:880px){
    body{padding:0 0 60px 232px}
    main{padding:28px 32px}
    nav{
      top:0;bottom:0;left:0;right:auto;width:232px;flex-direction:column;justify-content:flex-start;
      gap:4px;padding:22px 14px;border-top:none;border-right:1px solid var(--border);
      background:rgba(11,14,20,.85);
    }
    nav .brand{display:block;font-size:20px;font-weight:700;letter-spacing:-.02em;padding:6px 12px 20px}
    nav .brand span{color:var(--accent)}
    nav button{
      flex:0 0 auto;flex-direction:row;gap:12px;padding:12px 14px;border-radius:12px;
      font-size:15px;justify-content:flex-start;
    }
    nav button.on{background:rgba(255,176,32,.08)}
    .nbadge{position:static;margin-left:auto}
    #sheet-ov{align-items:center;justify-content:center;padding:24px}
    #sheet{max-width:480px;border-radius:22px;border:1px solid var(--border2)}
  }
  @media (hover:hover){
    .item:hover{background:rgba(255,255,255,.025)}
    .btn:hover{filter:brightness(1.07)}
    .btn2:hover,.fold:hover,.cal-head button:hover{border-color:var(--border2)}
    nav button:hover{color:var(--text)}
    nav button.on:hover{color:var(--accent)}
    .cal-cell:hover{background:rgba(255,255,255,.04)}
    .more:hover{text-decoration:underline}
    .hit:hover .box{border-color:var(--green)}
  }
  /* motion is a courtesy, never a delay */
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation:none!important;transition:none!important}
    html{scroll-behavior:auto}
  }
</style>
</head>
<body>
<main>
  <!-- DUMP -->
  <div class="view active" id="v-dump">
    <div class="top"><h1>Kevin<span>OS</span></h1><div class="sub" id="pending"></div></div>
    <textarea id="dump" placeholder="Dump it. Messy is fine — the system holds it so your head doesn't have to."></textarea>
    <button class="btn" id="save">Save to Inbox</button>
    <div id="status"></div>
    <button class="btn2" id="dev-link">🛠 Developer roadmap — what's shipped &amp; what's next</button>
    <div class="tiny"><a href="#" id="reset">change token</a></div>
  </div>

  <!-- DEV / ROADMAP -->
  <div class="view" id="v-dev">
    <div class="top"><h1>Developer</h1><div class="sub">what's next for KevinOS</div></div>
    <button class="btn2" id="dev-back" style="margin-bottom:12px">‹ Back to Dump</button>
    <div id="dev-body" class="loading">Loading…</div>
  </div>

  <!-- TODAY -->
  <div class="view" id="v-today">
    <div class="top"><h1>Today</h1><div class="sub" id="today-date"></div></div>
    <div id="today-body" class="loading">Loading…</div>
  </div>

  <!-- CALENDAR -->
  <div class="view" id="v-cal">
    <div class="top"><h1>Calendar</h1><div class="sub" id="cal-count"></div></div>
    <div id="cal-body" class="loading">Loading…</div>
  </div>

  <!-- MONEY -->
  <div class="view" id="v-money">
    <div class="top"><h1>Money</h1><div class="sub">from HCP, Saturdays 5am</div></div>
    <div id="money-body" class="loading">Loading…</div>
  </div>

  <!-- LEARN / EDUCATION -->
  <div class="view" id="v-edu">
    <div class="top"><h1>Learn</h1><div class="sub">training &amp; certifications</div></div>
    <div id="edu-body" class="loading">Loading…</div>
  </div>
</main>

<div id="sheet-ov" hidden>
  <div id="sheet">
    <div class="grab"></div>
    <div id="sheet-title"></div>
    <div id="sheet-rows"></div>
    <button class="btn" id="sheet-done">Mark done ✓</button>
    <button class="btn2" id="sheet-close">Close</button>
  </div>
</div>

<nav>
  <div class="brand">Kevin<span>OS</span></div>
  <button data-v="dump" class="on">
    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span>Dump</span>
  </button>
  <button data-v="today">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.6 4.6l1.8 1.8M17.6 17.6l1.8 1.8M19.4 4.6l-1.8 1.8M6.4 17.6l-1.8 1.8"/></svg><span>Today</span>
  </button>
  <button data-v="cal">
    <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M8 3v4M16 3v4M3 10h18"/></svg><span>Cal</span>
  </button>
  <button data-v="money">
    <svg viewBox="0 0 24 24"><path d="M12 2.5v19M16.8 7.2c-.6-1.4-2.4-2.2-4.8-2.2-2.7 0-4.8 1.2-4.8 3.2s2.1 2.7 4.8 3.1c2.7.4 4.8 1.1 4.8 3.1s-2.1 3.2-4.8 3.2c-2.4 0-4.2-.8-4.8-2.2"/></svg><span>Money</span>
  </button>
  <button data-v="edu">
    <svg viewBox="0 0 24 24"><path d="M12 4L2 9l10 5 10-5-10-5zM5 11.5V16c0 1.4 3.1 3 7 3s7-1.6 7-3v-4.5"/></svg><span>Learn</span>
  </button>
</nav>

<script>
const OWNER='kliu6151', REPO='KevinOS';
const $=id=>document.getElementById(id);
const enc=s=>btoa(unescape(encodeURIComponent(s)));
const dec=s=>decodeURIComponent(escape(atob(s)));
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const todayStr=()=>{const d=new Date(),p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;};
const plusDays=n=>{const d=new Date();d.setDate(d.getDate()+n);const p=x=>String(x).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;};

function token(){
  let t=localStorage.getItem('gh_token');
  if(!t){t=prompt('Paste your GitHub token (one-time setup):');if(t)localStorage.setItem('gh_token',t.trim());}
  return localStorage.getItem('gh_token');
}
$('reset').onclick=e=>{e.preventDefault();localStorage.removeItem('gh_token');token();};

async function api(path,opts={}){
  const r=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/${path}`,{...opts,headers:{
    'Authorization':`Bearer ${token()}`,'Accept':'application/vnd.github+json',
    ...(opts.body?{'Content-Type':'application/json'}:{})}});
  if(r.status===404)return null;
  if(!r.ok)throw new Error((await r.json().catch(()=>({}))).message||r.status);
  return r.json();
}
/* file fetch with localStorage cache: instant paint from cache, network refresh behind it,
   stale fallback when GitHub is unreachable (job-site LTE) */
let cacheOnly=false,usedStale=false,keepView=false;
const cacheGet=p=>{try{const c=localStorage.getItem('fc_'+p);return c?JSON.parse(c):null;}catch(e){return null;}};
const hasCache=()=>Object.keys(localStorage).some(k=>k.startsWith('fc_'));
async function getFile(path){
  if(cacheOnly)return cacheGet(path);
  try{
    const j=await api(`contents/${path}`);
    if(!j){localStorage.removeItem('fc_'+path);return null;}
    const f={text:dec(j.content.replace(/\n/g,'')),sha:j.sha};
    try{localStorage.setItem('fc_'+path,JSON.stringify({text:f.text,sha:f.sha,ts:Date.now()}));}catch(e){}
    return f;
  }catch(e){
    const c=cacheGet(path);
    if(c){usedStale=true;return{text:c.text,sha:c.sha,stale:true};}

  }
}
function skel(){return '<div class="card">'+[78,52,68,38].map(w=>`<div class="skelrow" style="width:${w}%"></div>`).join('')+'</div>';}

/* ---- checkbox toggle: tolerant line match (ignores \r and edge whitespace) ---- */
const norm=s=>s.replace(/\r/g,'').trim();
async function toggleLine(path,line,el){
  if(el)el.classList.add('done');
  try{
    const f=await getFile(path);
    if(!f)throw new Error('file not found');
    if(f.stale)throw new Error('offline — reconnect and try again');
    const lines=f.text.split('\n');
    const i=lines.findIndex(l=>norm(l)===norm(line));
    if(i<0)throw new Error('item changed elsewhere — pull down to refresh');
    lines[i]=lines[i].replace('- [ ]','- [x]');
    const res=await api(`contents/${path}`,{method:'PUT',body:JSON.stringify({
      message:`done via app: ${norm(line).slice(6,60)}`,sha:f.sha,
      content:enc(lines.join('\n'))})});
    try{localStorage.setItem('fc_'+path,JSON.stringify({text:lines.join('\n'),sha:res.content.sha,ts:Date.now()}));}catch(e){}
    return true;
  }catch(e){
    if(el)el.classList.remove('done');
    alert('Sync failed: '+e.message);
    return false;
  }
}

let sheetCtx=null;
function openSheet(it,file,title){

    if(i===0)return; // first segment holds date+title, already shown

  $('sheet-rows').innerHTML=rows.map(([k,v])=>`<div class="srow"><div class="k">${esc(k)}</div><div>${esc(v)}</div></div>`).join('');

/* ---- parsers ---- */
function parseChecklist(text){
  const items=[];let section='';
  for(const raw of text.split('\n')){
    const line=raw.replace(/\r$/,'');
    if(line.startsWith('## ')){section=line.slice(3).trim();continue;}
    const m=line.match(/^- \[( |x)\] (.*)$/);
    if(m)items.push({line,checked:m[1]==='x',body:m[2],section});
  }
  return items;
}
const meta=(s,k)=>{const m=s.match(new RegExp(k+':([^|]+)'));return m?m[1].trim():'';};
const inline=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*([^*]+)\*/g,'<i>$1</i>');
const stripMeta=s=>s.split(' — ')[0].split(' | ')[0].trim();
// calendar bodies lead with the date, so the title comes AFTER the dash
const evTitle=b=>b.replace(/^\d{4}-\d{2}-\d{2}( \d{2}:\d{2})?\s*[—-]?\s*/,'').split(' | ')[0].trim()||stripMeta(b);

function itemHTML(it,file,extra='',title){
  const t=title||stripMeta(it.body);
  const div=document.createElement('div');
  // red rail = overdue only (a passed due date or an overdue nudge) — priority alone stays neutral
  const late=/⚠|overdue|pri1">due /.test(extra);
  div.className='item'+(it.checked?' done':'')+(late?' late':'');
  div.innerHTML=`<div class="hit"><div class="box">✓</div></div><div style="flex:1"><div class="txt">${esc(t)}</div>${extra?`<div class="meta">${extra}</div>`:''}</div>`;
  if(!it.checked){
    div.querySelector('.hit').onclick=e=>{e.stopPropagation();toggleLine(file,it.line,div).then(ok=>{if(ok)afterToggle(file);});};
    div.onclick=()=>openSheet(it,file,t);
  }
  return div;
}
/* daily-plan item: title + untruncated implementation intention; everything visible, no sheet needed */
function planItem(it,file){
  const di=it.body.indexOf(' — ');
  const title=di>0?it.body.slice(0,di):it.body;
  const intent=di>0?it.body.slice(di+3).trim():'';
  const div=document.createElement('div');
  div.className='item'+(it.checked?' done':'');
  div.innerHTML=`<div class="hit"><div class="box">✓</div></div><div style="flex:1"><div class="txt">${inline(title)}</div>${intent?`<div class="intent">${inline(intent)}</div>`:''}</div>`;
  if(!it.checked)div.querySelector('.hit').onclick=e=>{e.stopPropagation();toggleLine(file,it.line,div).then(ok=>{if(ok)afterToggle(file);});};
  return div;
}
/* after a successful check: Today updates in place (no layout jump, folds keep state);

function afterToggle(file){

function card(){const c=document.createElement('div');c.className='card';return c;}
function empty(card,msg){card.innerHTML=`<div class="empty">${msg}</div>`;}

/* collapsible fold: returns {head, card} — append both */
function fold(title,countLabel,open=false,warn=0){
  const head=document.createElement('button');
  head.className='fold'+(open?' open':'');
  head.innerHTML=`<svg class="chev" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg><span class="ft">${esc(title)}</span>${countLabel?`<span class="fc">${esc(countLabel)}</span>`:''}${warn?`<span class="fw">${warn} ⚠</span>`:''}`;
  const c=card();c.classList.add('foldcard');c.style.display=open?'':'none';
  head.onclick=()=>{const show=c.style.display==='none';c.style.display=show?'':'none';head.classList.toggle('open',show);};

/* capped list: show first `cap`, rest behind "N more" */
function appendCapped(cardEl,items,make,cap=5){
  items.slice(0,cap).forEach(it=>cardEl.appendChild(make(it)));
  if(items.length>cap){
    const more=document.createElement('button');more.className='more';
    more.textContent=`▸ ${items.length-cap} more`;
    more.onclick=()=>{items.slice(cap).forEach(it=>cardEl.insertBefore(make(it),more));more.remove();};
    cardEl.appendChild(more);

}
/* group items by ## section inside one card */
function groupInto(cardEl,items,make){
  const bySec={};items.forEach(it=>{(bySec[it.section||'Other']=bySec[it.section||'Other']||[]).push(it);});
  for(const[sec,arr]of Object.entries(bySec)){
    cardEl.insertAdjacentHTML('beforeend',`<div class="subsec">${esc(sec)}</div>`);
    arr.forEach(it=>cardEl.appendChild(make(it)));

}
/* ---- daily-note section parsing (concept A) ---- */
function noteSections(text){
  const secs=[];let pre=[],cur=null;
  for(const raw of text.split('\n')){
    const line=raw.replace(/\r$/,'');
    if(line.startsWith('## ')){cur={title:line.slice(3).trim(),lines:[]};secs.push(cur);continue;}
    if(line.startsWith('# '))continue;
    (cur?cur.lines:pre).push(line);
  }
  return {pre,secs};
}
const secByName=(secs,re)=>secs.find(s=>re.test(s.title));
const checkboxLines=lines=>lines.map(l=>{const m=l.match(/^- \[( |x)\] (.*)$/);return m?{line:l,checked:m[1]==='x',body:m[2]}:null;}).filter(Boolean);
/* Top 3 state from the cached daily note (cache is updated on every successful toggle) */
function top3State(){
  const d=cacheGet(`daily/${todayStr()}.md`);
  if(!d)return null;
  const sec=secByName(noteSections(d.text).secs,/^top 3/i);
  if(!sec)return null;
  const items=checkboxLines(sec.lines);
  return items.length?{done:items.filter(i=>i.checked).length,total:items.length}:null;
}
/* progress dots + acknowledgment; lives in #prog-wrap at the top of Today */
function renderProgress(){
  const w=$('prog-wrap');if(!w)return;
  const st=top3State();
  if(!st){w.innerHTML='';return;}
  w.innerHTML=`<div class="prog"><span class="pdots${st.done>=st.total?' all':''}">${Array.from({length:st.total},(_,i)=>`<span class="pdot${i<st.done?' on':''}"></span>`).join('')}</span><span class="pt">${st.done} of ${st.total}</span></div>`
    +(st.done>=st.total?'<div class="ack">Top 3 cleared. Anything else today is bonus — or dump it for tomorrow.</div>':'');
}
/* presentation-layer dedup: a task/loop is "covered" by a plan line when they share
   ≥2 meaningful tokens AND the overlap is ≥60% of the smaller token set.
   Limitation: a full paraphrase with no shared tokens slips through; two different
   tasks about the same subject can rarely over-match. Source data is never touched. */
const STOPW=new Set(['the','a','an','to','for','of','in','on','re','and','or','with','at','from','by','it','is','are','was','be','before','after','via','per']);
const simTokens=s=>{const set=new Set();for(const w of s.toLowerCase().split(/[^a-z0-9+#]+/)){if(w.length>1&&!STOPW.has(w))set.add(w);}return set;};
function similar(a,b){
  const A=simTokens(a.split(' | ')[0]),B=simTokens(b.split(' | ')[0]);
  if(A.size<2||B.size<2)return false;
  let n=0;A.forEach(x=>{if(B.has(x))n++;});
  return n>=2&&n/Math.min(A.size,B.size)>=0.6;
}
const dueLoopMeta=it=>{
  const bits=[];
  const w=meta(it.body,'waiting-on');if(w)bits.push('waiting on '+w);
  const od=Math.round((new Date(todayStr())-new Date(meta(it.body,'nudge')))/864e5);
  if(od>=3)bits.push(`<span class="pri1">⚠ ${od} days overdue</span>`);
  return bits.join(' · ');
};

/* intel briefing: "**1. Headline**" blocks with body, "**Why it matters:**", "*Source: ...*".
   Tolerant of trailing "(source)" text after the headline's closing ** — routine output drifts. */
function parseIntel(lines){
  const items=[];let cur=null,mode='body';
  for(const raw of lines){
    const line=raw.replace(/\r$/,'').trim();
    if(!line)continue;
    const h=line.match(/^\*\*(\d+)[.)]\s*(.+?)\*\*(.*)$/);
    if(h){
      cur={title:h[2],body:[],why:[],src:''};
      const trail=h[3].trim();
      if(trail){const p=trail.match(/^\((.+)\)$/);if(p)cur.src=p[1];else cur.body.push(trail);}
      items.push(cur);mode='body';continue;
    }
    if(!cur)continue;
    const w=line.match(/^\*\*Why it matters:?\*\*:?\s*(.*)$/i);
    if(w){mode='why';if(w[1])cur.why.push(w[1]);continue;}
    const s=line.match(/^[*_]?Source:\s*(.+?)[*_]?$/i);
    if(s){cur.src=cur.src?cur.src+' · '+s[1]:s[1];mode='body';continue;}
    (mode==='why'?cur.why:cur.body).push(line);
  }
  return items;
}
function intelEl(st){
  const div=document.createElement('div');div.className='intel';
  div.innerHTML=`<div class="ih">${inline(st.title)}</div>`
    +(st.body.length?`<div class="ib">${st.body.map(inline).join('<br>')}</div>`:'')
    +(st.why.length?`<div class="iw"><b>Why it matters:</b> ${st.why.map(inline).join(' ')}</div>`:'')
    +(st.src?`<div class="is">Source: ${esc(st.src)}</div>`:'');
  return div;
}
const taskMeta=it=>{
  const pri=meta(it.body,'pri'),due=meta(it.body,'due'),bits=[];
  if(pri==='1')bits.push('<span class="pri1">priority</span>');
  if(due)bits.push(due<=todayStr()?'<span class="pri1">due '+due+'</span>':'due '+due);
  return bits.join(' · ');
};
const loopMeta=it=>{
  const bits=[];
  const w=meta(it.body,'waiting-on');if(w)bits.push('waiting on '+w);
  const n=meta(it.body,'nudge');
  if(n){
    const od=Math.round((new Date(todayStr())-new Date(n))/864e5);
    if(od>=3)bits.push(`<span class="pri1">⚠ ${od} days overdue — chase it or kill it</span>`);
    else if(od>=0)bits.push('<span class="pri1">nudge due</span>');
    else bits.push('nudge '+n);
  }
  return bits.join(' · ');
};

/* ---- TODAY (concept A: progress → top 3 w/ intentions → first move → follow-ups →
        schedule → needs attention (deduped, capped) → intel (folded) → streaks → held → full plan) ---- */
async function renderToday(){
  const body=$('today-body');
  $('today-date').textContent=new Date().toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'});
  if(!keepView)body.innerHTML=skel();
  const t=todayStr(),horizon=plusDays(3),dailyPath=`daily/${t}.md`;
  const [cal,loops,tasks,daily,habits]=await Promise.all([
    getFile('data/calendar.md'),getFile('data/loops.md'),getFile('data/tasks.md'),
    getFile(dailyPath),getFile('data/habits.md')]);
  body.innerHTML='';

  // parse the daily note into ## sections; Intel gets its own fold further down
  const ns=daily?noteSections(daily.text):{pre:[],secs:[]};
  const intelSec=secByName(ns.secs,/^intel\b/i);
  const top3Sec=secByName(ns.secs,/^top 3/i);
  const top3=top3Sec?checkboxLines(top3Sec.lines):[];
  const fmSec=secByName(ns.secs,/^first move/i);
  const dfSec=secByName(ns.secs,/^due follow/i);
  const noteFollowups=dfSec?checkboxLines(dfSec.lines):[];
  const rqSec=secByName(ns.secs,/^rebate submit/i);

  // top-3 progress (filled by renderProgress; updated in place after each check)
  body.insertAdjacentHTML('beforeend','<div id="prog-wrap"></div>');

  if(!daily){
    body.insertAdjacentHTML('beforeend','<div class="sec">Today\'s Plan</div>');
    const c0=card();body.appendChild(c0);
    empty(c0,'No plan yet. Run <b>/daily</b> in Claude — it sorts every pending dump and hands you Top 3 + first move.');
  }

  // TOP 3 — full implementation intentions, never truncated
  if(top3.length){
    body.insertAdjacentHTML('beforeend','<div class="sec">Top 3</div>');
    const c1=card();body.appendChild(c1);
    top3.forEach((it,i)=>{
      const el=planItem(it,dailyPath);
      if(i===0)el.classList.add('mw'); // the Must Win carries the page's one amber rail
      c1.appendChild(el);
    });
  }

  // FIRST MOVE — the one action that starts the day, above everything secondary
  if(fmSec){
    const fmTxt=fmSec.lines.map(l=>l.trim()).filter(Boolean).map(inline).join('<br>');
    if(fmTxt)body.insertAdjacentHTML('beforeend',`<div class="fm"><b>First move:</b> ${fmTxt}</div>`);
  }
  renderProgress();

  // DUE FOLLOW-UPS from the plan (checkbox lines only; prose stays in the full-plan fold)
  if(noteFollowups.length){
    body.insertAdjacentHTML('beforeend','<div class="sec">Due Follow-ups</div>');
    const cf=card();body.appendChild(cf);
    noteFollowups.forEach(it=>cf.appendChild(planItem(it,dailyPath)));
  }

  // REBATE SUBMIT QUEUE (Sundays) — actionable money items stay visible
  if(rqSec&&rqSec.lines.some(l=>l.trim())){
    body.insertAdjacentHTML('beforeend','<div class="sec">Rebate Submit Queue</div>');
    const cq=card();body.appendChild(cq);
    const wq=document.createElement('div');wq.className='note';
    for(const line of rqSec.lines){
      if(!line.trim())continue;
      const m=line.match(/^- \[( |x)\] (.*)$/);
      if(m){cq.appendChild(planItem({line,checked:m[1]==='x',body:m[2]},dailyPath));continue;}
      const e=document.createElement('div');e.innerHTML=inline(line.replace(/^- /,'• '));wq.appendChild(e);
    }
    if(wq.childNodes.length)cq.insertBefore(wq,cq.firstChild);
  }

  // schedule (today + next 3 days), capped at 5
  body.insertAdjacentHTML('beforeend','<div class="sec">Schedule</div>');
  const c2=card();body.appendChild(c2);
  const events=cal?parseChecklist(cal.text).filter(it=>{
    const d=(it.body.match(/(\d{4}-\d{2}-\d{2})/)||[])[1];
    return !it.checked&&d&&d>=t&&d<=horizon;
  }).sort((a,b)=>a.body.localeCompare(b.body)):[];
  if(!events.length)empty(c2,'Nothing scheduled through '+horizon+'. If that\'s wrong, dump it — dates are sacred here.');
  appendCapped(c2,events,it=>{
    const d=(it.body.match(/(\d{4}-\d{2}-\d{2})( \d{2}:\d{2})?/)||[]);
    const label=d[1]===t?`<span class="today-badge">TODAY${d[2]||''}</span>`:d[0];
    return itemHTML(it,'data/calendar.md',label,evTitle(it.body));
  });

  // NEEDS ATTENTION — deduped against the plan, max 3 visible, rest behind "Also on the radar"
  const loopsAll=loops?parseChecklist(loops.text).filter(it=>!it.checked):[];
  const tasksAll=tasks?parseChecklist(tasks.text).filter(it=>!it.checked):[];
  const dueLoops=loopsAll.filter(it=>{const n=meta(it.body,'nudge');return n&&n<=t;});
  const hotTasks=tasksAll.filter(it=>{const d=meta(it.body,'due');return (d&&d<=t)||meta(it.body,'pri')==='1';});
  const planTexts=top3.map(i=>i.body).concat(noteFollowups.map(i=>i.body));
  const hot=[
    ...hotTasks.map(it=>({it,file:'data/tasks.md',info:taskMeta(it)})),
    ...dueLoops.map(it=>({it,file:'data/loops.md',info:dueLoopMeta(it)}))
  ].map(h=>({...h,dup:planTexts.some(p=>similar(p,h.it.body))}));
  const freshHot=hot.filter(h=>!h.dup),dupHot=hot.filter(h=>h.dup);
  const visibleHot=freshHot.slice(0,3),radar=freshHot.slice(3).concat(dupHot);
  body.insertAdjacentHTML('beforeend','<div class="sec">Needs Attention</div>');
  const c3=card();body.appendChild(c3);
  if(!hot.length)empty(c3,'Nothing due. The system is holding your loops — head clear.');
  else if(!visibleHot.length)empty(c3,'Everything urgent today is already covered by your Top 3.');
  visibleHot.forEach(h=>c3.appendChild(itemHTML(h.it,h.file,h.info)));
  if(radar.length){
    const fr=fold('Also on the radar',radar.length+' more');
    body.appendChild(fr.head);body.appendChild(fr.card);
    radar.forEach(h=>fr.card.appendChild(itemHTML(h.it,h.file,(h.dup?'<span class="today-badge">≈ in Top 3</span>'+(h.info?' · ':''):'')+h.info)));
  }

  // intel briefing — collapsed by default; open it when you want the news
  if(intelSec&&intelSec.lines.some(l=>l.trim())){
    const stories=parseIntel(intelSec.lines);
    body.insertAdjacentHTML('beforeend','<div class="sec">Intel — Industry Brief</div>');
    const fi=fold('Morning intel',stories.length?stories.length+' stories':'',false);
    body.appendChild(fi.head);body.appendChild(fi.card);
    if(stories.length)stories.forEach(st=>fi.card.appendChild(intelEl(st)));
    else{
      const wrap=document.createElement('div');wrap.className='note';
      intelSec.lines.forEach(l=>{if(l.trim()){const e=document.createElement('div');e.innerHTML=inline(l);wrap.appendChild(e);}});
      fi.card.appendChild(wrap);
    }
  }

  // habit streaks
  if(habits){
    const hs=habits.text.split('\n').map(l=>l.match(/^- ([^|]+)\|.*streak:(\d+)/)).filter(Boolean);
    if(hs.length){
      body.insertAdjacentHTML('beforeend','<div class="sec">Streaks</div>');
      const chips=document.createElement('div');chips.className='chips';
      hs.forEach(h=>chips.insertAdjacentHTML('beforeend',`<div class="chip">${esc(h[1].trim())} <b>${h[2]}🔥</b></div>`));
      body.appendChild(chips);
    }
  }

  // held pile — everything open that is NOT due yet, collapsed by default
  const heldTasks=tasksAll.filter(it=>!hotTasks.includes(it));
  const heldLoops=loopsAll.filter(it=>!dueLoops.includes(it));
  if(heldTasks.length||heldLoops.length){
    body.insertAdjacentHTML('beforeend','<div class="sec">Held — not lost</div>');
    if(heldTasks.length){
      const f1=fold('Tasks',heldTasks.length+' held');
      body.appendChild(f1.head);body.appendChild(f1.card);
      heldTasks.sort((a,b)=>(meta(a.body,'pri')||'9').localeCompare(meta(b.body,'pri')||'9'));
      groupInto(f1.card,heldTasks,it=>itemHTML(it,'data/tasks.md',taskMeta(it)));
    }
    if(heldLoops.length){
      const f2=fold('Follow-ups',heldLoops.length+' held');
      body.appendChild(f2.head);body.appendChild(f2.card);
      groupInto(f2.card,heldLoops,it=>itemHTML(it,'data/loops.md',loopMeta(it)));
    }
  }

  // FULL PLAN — the note as written, read-only (checkboxes are interactive in the sections above).
  // Opens by default only when the note has no Top 3 to extract, so nothing is ever hidden.
  if(daily){
    body.insertAdjacentHTML('beforeend','<div class="sec">Full Plan</div>');
    const fp=fold('The plan as written','',!top3.length);
    const wp=document.createElement('div');wp.className='note';
    const docLines=[...ns.pre,...ns.secs.filter(s=>s!==intelSec).flatMap(s=>['## '+s.title,...s.lines])];
    for(const line of docLines){
      if(!line.trim()){wp.insertAdjacentHTML('beforeend','<div class="gap"></div>');continue;}
      const m=line.match(/^- \[( |x)\] (.*)$/);
      const e=document.createElement('div');
      if(m){e.className='ro'+(m[1]==='x'?' done':'');e.innerHTML=`<span class="glyph">${m[1]==='x'?'✓':'○'}</span><span>${inline(m[2])}</span>`;}
      else if(line.startsWith('## ')){e.className='h2';e.textContent=line.slice(3);}
      else if(line.startsWith('- ')){e.className='bullet';e.innerHTML='• '+inline(line.slice(2));}
      else e.innerHTML=inline(line);
      wp.appendChild(e);
    }
    fp.card.appendChild(wp);
    body.appendChild(fp.head);body.appendChild(fp.card);
  }
}

/* ---- CALENDAR (month grid + day agenda) ---- */
let calMonth=null,calSel=null,calEvs=[];
const evDate=it=>(it.body.match(/(\d{4}-\d{2}-\d{2})/)||[])[1];
const evTime=it=>((it.body.match(/\d{4}-\d{2}-\d{2} (\d{2}:\d{2})/)||[])[1])||'';

function drawCal(){
  const body=$('cal-body');body.innerHTML='';
  const t=todayStr();
  const y=calMonth.getFullYear(),m=calMonth.getMonth();
  const p=n=>String(n).padStart(2,'0');
  const byDay={};calEvs.forEach(it=>{const d=evDate(it);(byDay[d]=byDay[d]||[]).push(it);});

  // header
  body.insertAdjacentHTML('beforeend',`<div class="cal-head">
    <button id="cal-prev">‹</button>
    <div class="mon">${calMonth.toLocaleDateString(undefined,{month:'long',year:'numeric'})}</div>
    <button id="cal-next">›</button></div>`);

  // grid
  const grid=document.createElement('div');grid.className='cal-grid';
  ['S','M','T','W','T','F','S'].forEach(d=>grid.insertAdjacentHTML('beforeend',`<div class="dow">${d}</div>`));
  const first=new Date(y,m,1),days=new Date(y,m+1,0).getDate();
  for(let i=0;i<first.getDay();i++)grid.insertAdjacentHTML('beforeend','<div></div>');
  for(let d=1;d<=days;d++){
    const ds=`${y}-${p(m+1)}-${p(d)}`;
    const cell=document.createElement('button');
    cell.className='cal-cell'+(ds===t?' today':'')+(ds===calSel?' sel':'')+(byDay[ds]&&ds<t?' past-due':'');
    cell.innerHTML=`${d}${byDay[ds]?'<span class="dot"></span>':''}`;
    cell.onclick=()=>{calSel=ds;drawCal();};
    grid.appendChild(cell);
  }
  body.appendChild(grid);
  $('cal-prev').onclick=()=>{calMonth=new Date(y,m-1,1);drawCal();};
  $('cal-next').onclick=()=>{calMonth=new Date(y,m+1,1);drawCal();};

  // selected day agenda
  const selDate=new Date(calSel+'T00:00');
  body.insertAdjacentHTML('beforeend',`<div class="day-title">${selDate.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})}${calSel===t?' — today':''}</div>`);
  const c=card();body.appendChild(c);
  const items=(byDay[calSel]||[]).sort((a,b)=>evTime(a).localeCompare(evTime(b)));
  if(!items.length)empty(c,'Nothing this day.');
  items.forEach(it=>{
    const late=calSel<t?'<span class="pri1">past — reschedule or check off</span>':evTime(it);
    c.appendChild(itemHTML(it,'data/calendar.md',late,evTitle(it.body)));
  });

  // missed (before today) — decide, don't ignore
  const missed=calEvs.filter(it=>evDate(it)<t);
  if(missed.length){
    body.insertAdjacentHTML('beforeend','<div class="sec">Missed — decide</div>');
    const mc=card();body.appendChild(mc);
    appendCapped(mc,missed,it=>itemHTML(it,'data/calendar.md',`<span class="pri1">was ${evDate(it)}</span>`,evTitle(it.body)));
  }

  // upcoming agenda (next 30 days), capped at 8
  const horizon=plusDays(30);
  const upcoming=calEvs.filter(it=>{const d=evDate(it);return d>=t&&d<=horizon;})
    .sort((a,b)=>a.body.localeCompare(b.body));
  body.insertAdjacentHTML('beforeend','<div class="sec">Next 30 Days</div>');
  const uc=card();body.appendChild(uc);
  if(!upcoming.length)empty(uc,'Nothing coming up. Dump anything with a date and it lands here.');
  let lastD='';
  const rows=upcoming.map(it=>{
    const d=evDate(it);
    const label=(d!==lastD?new Date(d+'T00:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}):'')+(evTime(it)?' '+evTime(it):'');
    lastD=d;
    return {it,label:d===t?`<span class="today-badge">TODAY</span>${evTime(it)?' '+evTime(it):''}`:label};
  });
  appendCapped(uc,rows,r=>itemHTML(r.it,'data/calendar.md',r.label,evTitle(r.it.body)),8);
}

async function renderCal(){
  const body=$('cal-body');if(!keepView)body.innerHTML=skel();
  const f=await getFile('data/calendar.md');
  calEvs=f?parseChecklist(f.text).filter(it=>!it.checked&&it.body.match(/\d{4}-\d{2}-\d{2}/)):[];
  $('cal-count').textContent=calEvs.length?calEvs.length+' scheduled':'';
  if(!calMonth){calMonth=new Date();calMonth.setDate(1);calSel=todayStr();}
  drawCal();
}

/* ---- MONEY (money.md as a ledger: name left, amount right, aging badge) ---- */
const AMT_RE=/\$[\d,]+(?:\.\d{1,2})?/g;
const parseAmt=a=>parseFloat(a.replace(/[$,]/g,''));
const fmtAmt=v=>'$'+Math.round(v).toLocaleString();
const compactAmt=v=>v>=1e6?'$'+(v/1e6).toFixed(2)+'M':v>=1e3?'$'+Math.round(v/1e3)+'k':fmtAmt(v);

/* pipe-delimited money line → structured ledger row */
function ledgerRow(line){
  const cm=line.match(/^- \[( |x)\] (.*)$/);
  const body=cm?cm[2]:line.replace(/^- /,'');
  const it={line,checked:cm?cm[1]==='x':false,body};
  const parts=body.split(' | ').map(s=>s.trim());
  let head=parts[0],amt=0,age='',warn=false;
  const amts=(head.match(AMT_RE)||[]).map(parseAmt);
  if(amts.length){amt=amts.reduce((a,b)=>a+b,0);head=head.replace(AMT_RE,'').replace(/\s{2,}/g,' ').replace(/\s\+\s*$/,'').trim();}
  const metaBits=[];
  for(const seg of parts.slice(1)){
    const am=seg.match(/^(\d+)d( ⚠)?$/);
    if(am){age=am[1]+'d';warn=!!am[2];continue;}
    const gm=seg.match(/^gross (\$[\d,]+(?:\.\d{1,2})?)/);
    if(gm&&!amt){amt=parseAmt(gm[1]);continue;}
    if(seg&&seg!=='—')metaBits.push(seg);
  }
  // "Name — program" split, then pull a leading "#1234" / "Est #1234" into a chip
  let name=head,sub='';
  const di=head.indexOf(' — ');
  if(di>0){name=head.slice(0,di);sub=head.slice(di+3).replace(/\s\+\s*$/,'').trim();}
  let chip='';
  const jm=name.match(/^(Est\s+)?#(\S+)\s*(.*)$/);
  if(jm){chip=(jm[1]?'Est ':'')+'#'+jm[2];name=jm[3].trim()||chip;if(name===chip)chip='';}
  if(sub)metaBits.unshift(sub);

  const div=document.createElement('div');
  div.className='item'+(it.checked?' done':'');
  div.innerHTML=`${cm?'<div class="hit"><div class="box">✓</div></div>':''}<div class="lwrap"><div class="lmain"><div class="txt">${esc(name)}${chip?`<span class="ljob">${esc(chip)}</span>`:''}</div>${metaBits.length?`<div class="meta">${esc(metaBits.join(' · '))}</div>`:''}</div>${(amt||age)?`<div class="lamt">${amt?`<div class="amt">${fmtAmt(amt)}</div>`:''}${age?`<div class="age${warn?' warn':''}">${age}${warn?' ⚠':''}</div>`:''}</div>`:''}</div>`;
  if(cm&&!it.checked){
    div.querySelector('.hit').onclick=e=>{e.stopPropagation();toggleLine('data/money.md',it.line,div).then(ok=>{if(ok)afterToggle('data/money.md');});};
    div.onclick=()=>openSheet(it,'data/money.md',name+(chip?' '+chip:''));
  }
  return div;
}
function moneyLineEl(line){
  if(line.startsWith('- ')&&line.includes(' | '))return ledgerRow(line); // top-level structured → ledger row
  const m=line.match(/^- \[( |x)\] (.*)$/);
  if(m)return itemHTML({line,checked:m[1]==='x',body:m[2]},'data/money.md');
  const el=document.createElement('div');
  if(line.startsWith('- ')){el.className='note bullet';el.textContent='• '+line.slice(2);}
  else{el.className='note';el.style.padding='4px 14px';el.innerHTML=esc(line).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/_(.+?)_/g,'<i>$1</i>');}
  return el;
}
async function renderMoney(){
  const body=$('money-body');if(!keepView)body.innerHTML=skel();
  const f=await getFile('data/money.md');body.innerHTML='';
  if(!f){const c=card();body.appendChild(c);empty(c,'No money.md yet — the weekend pipeline builds it.');return;}
  // split into preamble + ## sections
  const secs=[];let pre=[],cur=null;
  for(const raw of f.text.split('\n')){
    const line=raw.replace(/\r$/,'');
    if(line.startsWith('## ')){cur={title:line.slice(3),lines:[]};secs.push(cur);continue;}
    if(line.startsWith('# ')||!line.trim())continue;
    (cur?cur.lines:pre).push(line);
  }
  if(pre.length){const pc=card();body.appendChild(pc);pre.forEach(l=>pc.appendChild(moneyLineEl(l)));}
  const openByDefault=t=>/this month/i.test(t);
  secs.forEach(s=>{
    const open=/status:/i.test(s.title)||openByDefault(s.title);
    const openLines=s.lines.filter(l=>l.startsWith('- [ ]'));
    const nWarn=openLines.filter(l=>l.includes('⚠')).length;   // only count warnings still open
    const total=openLines.reduce((sum,l)=>sum+((l.split(' | ')[0].match(AMT_RE)||[]).map(parseAmt).reduce((a,b)=>a+b,0)),0);
    const label=openLines.length?openLines.length+' open'+(total?' · '+compactAmt(total):''):'';
    const sf=fold(s.title,label,open,nWarn);
    appendCapped(sf.card,s.lines,moneyLineEl,12);
    body.appendChild(sf.head);body.appendChild(sf.card);
  });
}

/* ---- DEV / ROADMAP (read-only) ---- */
async function renderDev(){
  const body=$('dev-body');body.innerHTML='<div class="loading">Loading…</div>';
  const f=await getFile('ROADMAP.md');body.innerHTML='';
  body.classList.remove('loading');
  const c=card();body.appendChild(c);
  if(!f){empty(c,'No ROADMAP.md found.');return;}
  const wrap=document.createElement('div');wrap.className='note';
  for(const raw of f.text.split('\n')){
    const line=raw.replace(/\r$/,'');
    const el=document.createElement('div');
    if(line.startsWith('# ')){el.className='h1';el.textContent=line.slice(2);}
    else if(line.startsWith('## ')){el.className='h2';el.textContent=line.slice(3);}
    else if(line.match(/^\d+\. |^- /)){el.className='bullet';el.innerHTML='• '+esc(line.replace(/^(\d+\. |- )/,'')).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');}
    else el.innerHTML=esc(line).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
    wrap.appendChild(el);
  }
  c.appendChild(wrap);
}
$('dev-link').onclick=e=>{
  e.preventDefault();
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  $('v-dev').classList.add('active');
  if(token())renderDev();
};
$('dev-back').onclick=()=>{
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  $('v-dump').classList.add('active');
};

/* ---- LEARN / EDUCATION: TOC + collapsible sections, tappable progress ---- */
const eduMd=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\[(.+?)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener" style="color:var(--accent)">$1</a>');
function eduLine(wrap,line){
  const cb=line.match(/^\s*- \[( |x)\] (.*)$/);
  if(cb){
    const it={checked:cb[1]==='x',body:cb[2]};
    const div=document.createElement('div');div.className='item'+(it.checked?' done':'');div.style.padding='10px 2px';
    div.innerHTML=`<div class="hit"><div class="box">✓</div></div><div class="txt">${eduMd(it.body)}</div>`;
    if(!it.checked)div.querySelector('.hit').onclick=()=>toggleLine('learning/insulation.md',line,div); // marks done in place, keeps folds
    wrap.appendChild(div);return;
  }
  const el=document.createElement('div');
  if(line.startsWith('### ')){el.className='h1';el.style.fontSize='15px';el.textContent=line.slice(4);}
  else if(line.match(/^\s*- /)){el.className='bullet';el.innerHTML='• '+eduMd(line.replace(/^\s*- /,''));}
  else if(line.trim()){el.innerHTML=eduMd(line);}
  else{el.className='gap';}
  wrap.appendChild(el);
}
async function renderEdu(){
  const body=$('edu-body');if(!keepView)body.innerHTML=skel();
  const f=await getFile('learning/insulation.md');body.innerHTML='';
  if(!f){const c=card();body.appendChild(c);empty(c,'No curriculum found (learning/insulation.md).');return;}
  const lines=f.text.split('\n').map(l=>l.replace(/\r$/,''));
  const total=lines.filter(l=>/^\s*- \[( |x)\] /.test(l)).length;
  const done=lines.filter(l=>/^\s*- \[x\] /.test(l)).length;
  if(total){
    const chips=document.createElement('div');chips.className='chips';
    chips.innerHTML=`<div class="chip">Progress <b>${done}/${total}</b></div><div class="chip">${Math.round(done/total*100)}% done</div>`;
    body.appendChild(chips);
  }
  // split into preamble + ## sections
  const secs=[];let pre=[],cur=null;
  for(const line of lines){
    if(line.startsWith('## ')){cur={title:line.slice(3),lines:[]};secs.push(cur);continue;}
    if(line.startsWith('# '))continue;
    (cur?cur.lines:pre).push(line);
  }
  if(pre.some(l=>l.trim())){const pc=card();const w=document.createElement('div');w.className='note';pre.forEach(l=>eduLine(w,l));pc.appendChild(w);body.appendChild(pc);}
  const folds=[];
  // table of contents
  if(secs.length>1){
    body.insertAdjacentHTML('beforeend','<div class="sec">Contents</div>');
    const toc=card();
    secs.forEach((s,i)=>{
      const todo=s.lines.filter(l=>/^\s*- \[ \] /.test(l)).length;
      const b=document.createElement('button');b.className='more';
      b.innerHTML=`${esc(s.title)}${todo?` <span style="color:var(--muted)">· ${todo} to do</span>`:''}`;
      b.onclick=()=>{const fd=folds[i];if(fd.card.style.display==='none')fd.head.click();fd.head.scrollIntoView({behavior:'smooth',block:'start'});};
      toc.appendChild(b);
    });
    body.appendChild(toc);
  }
  // collapsible section folds (first open)
  secs.forEach((s,i)=>{
    const todo=s.lines.filter(l=>/^\s*- \[ \] /.test(l)).length;
    const dn=s.lines.filter(l=>/^\s*- \[x\] /.test(l)).length;
    const label=(todo+dn)?`${dn}/${todo+dn} done`:'';
    const fd=fold(s.title,label,i===0,0);
    const w=document.createElement('div');w.className='note';
    s.lines.forEach(l=>eduLine(w,l));
    fd.card.appendChild(w);
    body.appendChild(fd.head);body.appendChild(fd.card);
    folds.push(fd);
  });
}

/* ---- nav + render orchestration ---- */
let currentView='dump',lastRender=0;
const renderers={today:renderToday,cal:renderCal,money:renderMoney,edu:renderEdu};
const viewBody={today:'today-body',cal:'cal-body',money:'money-body',edu:'edu-body'};

/* two-pass render: paint cached data instantly, then refresh from network.
   offline → banner over cached view, or an error card with retry if nothing cached. */
async function runRender(name){
  const fn=renderers[name];if(!fn||!token())return;
  const bodyEl=$(viewBody[name]);
  // the initial "Loading…" container class centers + mutes ALL text; it must not
  // survive into rendered content (skeleton/empty/error states carry their own styles)
  bodyEl.classList.remove('loading');
  let painted=false;
  if(hasCache()){
    cacheOnly=true;
    try{await fn();painted=true;}catch(e){}
    cacheOnly=false;
  }
  usedStale=false;keepView=painted;
  try{
    await fn();lastRender=Date.now();
    if(usedStale)bodyEl.insertAdjacentHTML('afterbegin','<div class="stale">⚠ Offline — showing last synced data</div>');
  }catch(e){
    if(painted)bodyEl.insertAdjacentHTML('afterbegin','<div class="stale">⚠ Offline — showing last synced data</div>');
    else{
      bodyEl.innerHTML='';
      const c=card();c.innerHTML=`<div class="empty">Couldn't reach GitHub — ${esc(e.message||'network error')}. Check signal, then retry.</div>`;
      bodyEl.appendChild(c);
      const b=document.createElement('button');b.className='btn2';b.textContent='↻ Retry';
      b.onclick=()=>runRender(name);
      bodyEl.appendChild(b);
    }
  }
  keepView=false;
  updateBadge();
}

/* Today badge: remaining Top 3 when today's plan exists (counts down to zero as Kevin
   completes the plan); falls back to the due/priority count on days with no plan */
function updateBadge(){
  const st=top3State();
  let n;
  if(st)n=st.total-st.done;
  else{
    const t=todayStr();
    const tk=cacheGet('data/tasks.md'),lp=cacheGet('data/loops.md');
    n=0;
    if(tk)n+=parseChecklist(tk.text).filter(it=>{const d=meta(it.body,'due');return !it.checked&&((d&&d<=t)||meta(it.body,'pri')==='1');}).length;
    if(lp)n+=parseChecklist(lp.text).filter(it=>{const nd=meta(it.body,'nudge');return !it.checked&&nd&&nd<=t;}).length;
  }
  const btn=document.querySelector('nav button[data-v="today"]');
  let b=btn.querySelector('.nbadge');
  if(!n){if(b)b.remove();return;}
  if(!b){b=document.createElement('span');b.className='nbadge';btn.appendChild(b);}
  b.textContent=n>9?'9+':n;
}

document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{
  currentView=b.dataset.v;
  document.querySelectorAll('nav button').forEach(x=>x.classList.toggle('on',x===b));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  $('v-'+b.dataset.v).classList.add('active');
  runRender(b.dataset.v);
});

/* coming back to the app after 60s+ silently refreshes the current tab */
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&Date.now()-lastRender>60000&&renderers[currentView])runRender(currentView);
});

if(localStorage.getItem('gh_token')){refreshPending();updateBadge();}
