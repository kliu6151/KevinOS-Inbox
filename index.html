<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>KevinOS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d1117; color: #e6edf3; min-height: 100vh;
    padding: env(safe-area-inset-top) 0 calc(84px + env(safe-area-inset-bottom));
  }
  main { padding: 12px 16px; max-width: 640px; margin: 0 auto; }
  .view { display: none; } .view.active { display: block; }

  /* header */
  .top { display: flex; align-items: baseline; justify-content: space-between; padding: 14px 0 10px; }
  .top h1 { font-size: 19px; font-weight: 700; } .top h1 span { color: #58a6ff; }
  .top .sub { font-size: 12px; color: #8b949e; }

  /* capture */
  textarea {
    width: 100%; min-height: 42vh; background: #161b22; color: #e6edf3;
    border: 1px solid #30363d; border-radius: 14px; padding: 14px;
    font-size: 17px; line-height: 1.5; resize: none; outline: none;
  }
  textarea:focus { border-color: #58a6ff; }
  .btn {
    margin-top: 12px; padding: 16px; width: 100%; background: #238636; color: #fff;
    border: none; border-radius: 14px; font-size: 18px; font-weight: 600;
  }
  .btn:disabled { background: #21262d; color: #8b949e; }
  #status { text-align: center; padding: 10px; font-size: 14px; color: #8b949e; min-height: 38px; }
  #status.ok { color: #3fb950; } #status.err { color: #f85149; }
  .tiny { text-align: center; padding: 6px 0; } .tiny a { color: #8b949e; font-size: 12px; text-decoration: none; }

  /* sections & items */
  .sec { margin: 18px 0 6px; font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #8b949e; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 14px; overflow: hidden; }
  .item { display: flex; align-items: flex-start; gap: 12px; padding: 13px 14px; border-bottom: 1px solid #21262d; }
  .item:last-child { border-bottom: none; }
  .box {
    flex: none; width: 24px; height: 24px; margin-top: 1px; border: 2px solid #484f58;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: transparent;
  }
  .item.done { opacity: .45; } .item.done .txt { text-decoration: line-through; }
  .item.done .box { background: #238636; border-color: #238636; color: #fff; }
  .txt { font-size: 16px; line-height: 1.45; flex: 1; }
  .meta { font-size: 12.5px; color: #8b949e; margin-top: 2px; }
  .pri1 { color: #f85149; font-weight: 600; } .today-badge { color: #58a6ff; font-weight: 600; }
  .empty { padding: 16px 14px; color: #8b949e; font-size: 14.5px; line-height: 1.5; }
  .note { font-size: 15px; line-height: 1.6; padding: 14px; }
  .note .h1 { font-weight: 700; font-size: 16px; margin: 8px 0 4px; }
  .note .h2 { font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: .06em; color: #8b949e; margin: 12px 0 4px; }
  .note .bullet { padding-left: 10px; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; padding: 4px 0; }
  .chip { background: #161b22; border: 1px solid #30363d; border-radius: 999px; padding: 6px 12px; font-size: 13px; }
  .chip b { color: #d29922; }

  /* month calendar */
  .cal-head { display: flex; align-items: center; justify-content: space-between; padding: 4px 2px 10px; }
  .cal-head .mon { font-size: 17px; font-weight: 700; }
  .cal-head button { background: #161b22; border: 1px solid #30363d; color: #e6edf3; border-radius: 10px; width: 44px; height: 40px; font-size: 18px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .dow { text-align: center; font-size: 11px; color: #8b949e; font-weight: 700; padding: 4px 0; }
  .cal-cell {
    aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; font-size: 15px; color: #e6edf3;
    background: transparent; border: 1px solid transparent; position: relative;
  }
  .cal-cell.dim { color: #484f58; }
  .cal-cell.today { border-color: #58a6ff; font-weight: 700; }
  .cal-cell.sel { background: #1f6feb33; border-color: #58a6ff; }
  .cal-cell .dot { width: 5px; height: 5px; border-radius: 50%; background: #d29922; position: absolute; bottom: 6px; }
  .cal-cell.past-due .dot { background: #f85149; }
  .day-title { margin: 16px 0 6px; font-size: 14px; font-weight: 700; }

  /* bottom nav */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0; display: flex;
    background: rgba(13,17,23,.97); border-top: 1px solid #21262d;
    padding-bottom: max(env(safe-area-inset-bottom), 14px); backdrop-filter: blur(8px);
  }
  nav button {
    flex: 1; min-height: 52px; padding: 14px 0 12px; background: none; border: none;
    color: #8b949e; font-size: 14.5px; font-weight: 600;
  }
  nav button.on { color: #58a6ff; }
  .loading { padding: 24px; text-align: center; color: #8b949e; font-size: 14px; }
</style>
</head>
<body>
<main>
  <!-- DUMP -->
  <div class="view active" id="v-dump">
    <div class="top"><h1>Kevin<span>OS</span></h1><div class="sub" id="pending"></div></div>
    <textarea id="dump" placeholder="Dump it. Messy is fine — the system holds it so your head doesn't have to."></textarea>
    <button class="btn" id="save">Save to Inbox</button>
    <div id="status"></div>
    <div class="tiny"><a href="#" id="reset">change token</a></div>
  </div>

  <!-- TODAY -->
  <div class="view" id="v-today">
    <div class="top"><h1>Today</h1><div class="sub" id="today-date"></div></div>
    <div id="today-body" class="loading">Loading…</div>
  </div>

  <!-- TASKS -->
  <div class="view" id="v-tasks">
    <div class="top"><h1>Tasks</h1><div class="sub" id="task-count"></div></div>
    <div id="tasks-body" class="loading">Loading…</div>
  </div>

  <!-- LOOPS -->
  <div class="view" id="v-loops">
    <div class="top"><h1>Open Loops</h1><div class="sub"></div></div>
    <div id="loops-body" class="loading">Loading…</div>
  </div>

  <!-- CALENDAR -->
  <div class="view" id="v-cal">
    <div class="top"><h1>Calendar</h1><div class="sub" id="cal-count"></div></div>
    <div id="cal-body" class="loading">Loading…</div>
  </div>
</main>

<nav>
  <button data-v="dump" class="on">Dump</button>
  <button data-v="today">Today</button>
  <button data-v="cal">Cal</button>
  <button data-v="tasks">Tasks</button>
  <button data-v="loops">Loops</button>
</nav>

<script>
const OWNER='kliu6151', REPO='KevinOS';
const $=id=>document.getElementById(id);
const enc=s=>btoa(unescape(encodeURIComponent(s)));
const dec=s=>decodeURIComponent(escape(atob(s)));
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const todayStr=()=>{const d=new Date(),p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;};
const plusDays=n=>{const d=new Date();d.setDate(d.getDate()+n);const p=x=>String(x).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;};

function token(){
  let t=localStorage.getItem('gh_token');
  if(!t){t=prompt('Paste your GitHub token (one-time setup):');if(t)localStorage.setItem('gh_token',t.trim());}
  return localStorage.getItem('gh_token');
}
$('reset').onclick=e=>{e.preventDefault();localStorage.removeItem('gh_token');token();};

async function api(path,opts={}){
  const r=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/${path}`,{...opts,headers:{
    'Authorization':`Bearer ${token()}`,'Accept':'application/vnd.github+json',
    ...(opts.body?{'Content-Type':'application/json'}:{})}});
  if(r.status===404)return null;
  if(!r.ok)throw new Error((await r.json().catch(()=>({}))).message||r.status);
  return r.json();
}
async function getFile(path){
  const j=await api(`contents/${path}`);
  return j?{text:dec(j.content.replace(/\n/g,'')),sha:j.sha}:null;
}

/* ---- checkbox toggle: flips "- [ ]" to "- [x]" for an exact line in a file ---- */
async function toggleLine(path,line,el){
  el.classList.add('done');
  try{
    const f=await getFile(path);
    if(!f)throw new Error('file not found');
    if(!f.text.includes(line))throw new Error('item changed elsewhere — reopen this tab');
    const flipped=line.replace('- [ ]','- [x]');
    await api(`contents/${path}`,{method:'PUT',body:JSON.stringify({
      message:`done via app: ${line.slice(6,60)}`,sha:f.sha,
      content:enc(f.text.replace(line,flipped))})});
  }catch(e){
    el.classList.remove('done');
    alert('Sync failed: '+e.message);
  }
}

/* ---- parsers ---- */
function parseChecklist(text){
  const items=[];let section='';
  for(const raw of text.split('\n')){
    const line=raw.replace(/\r$/,'');
    if(line.startsWith('## ')){section=line.slice(3).trim();continue;}
    const m=line.match(/^- \[( |x)\] (.*)$/);
    if(m)items.push({line,checked:m[1]==='x',body:m[2],section});
  }
  return items;
}
const meta=(s,k)=>{const m=s.match(new RegExp(k+':([^|]+)'));return m?m[1].trim():'';};
const stripMeta=s=>s.split(' — ')[0].split(' | ')[0].trim();

function itemHTML(it,file,extra=''){
  const div=document.createElement('div');
  div.className='item'+(it.checked?' done':'');
  div.innerHTML=`<div class="box">✓</div><div style="flex:1"><div class="txt">${esc(stripMeta(it.body))}</div>${extra?`<div class="meta">${extra}</div>`:''}</div>`;
  if(!it.checked)div.onclick=()=>toggleLine(file,it.line,div);
  return div;
}
function card(){const c=document.createElement('div');c.className='card';return c;}
function empty(card,msg){card.innerHTML=`<div class="empty">${msg}</div>`;}

/* ---- DUMP ---- */
const dump=$('dump'),status=$('status'),save=$('save');
dump.value=localStorage.getItem('draft')||'';
dump.addEventListener('input',()=>localStorage.setItem('draft',dump.value));
async function refreshPending(){
  try{const files=await api('contents/inbox');
    const n=(files||[]).filter(f=>f.type==='file'&&f.name!=='README.md').length;
    $('pending').textContent=n?`${n} awaiting processing`:'inbox clear';
  }catch(e){}
}
save.onclick=async()=>{
  const text=dump.value.trim();
  if(!text){status.textContent='Nothing to save.';return;}
  save.disabled=true;status.className='';status.textContent='Saving…';
  try{
    const d=new Date(),p=n=>String(n).padStart(2,'0');
    const name=`dump-${todayStr()}-${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
    await api(`contents/inbox/${name}.md`,{method:'PUT',body:JSON.stringify({
      message:`inbox: phone dump`,content:enc(text+'\n')})});
    dump.value='';localStorage.removeItem('draft');
    status.className='ok';status.textContent='✓ Held. Out of your head — sorted on the next /daily.';
    refreshPending();
  }catch(e){status.className='err';status.textContent=`Failed: ${e.message}. Draft kept — try again.`;}
  save.disabled=false;
};

/* ---- TODAY ---- */
async function renderToday(){
  const body=$('today-body');
  $('today-date').textContent=new Date().toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'});
  body.innerHTML='<div class="loading">Loading…</div>';
  const t=todayStr(),horizon=plusDays(3);
  const [cal,loops,daily,habits]=await Promise.all([
    getFile('data/calendar.md'),getFile('data/loops.md'),
    getFile(`daily/${t}.md`),getFile('data/habits.md')]);
  body.innerHTML='';

  // schedule (today + next 3 days)
  body.insertAdjacentHTML('beforeend','<div class="sec">Schedule</div>');
  const c1=card();body.appendChild(c1);
  const events=cal?parseChecklist(cal.text).filter(it=>{
    const d=(it.body.match(/(\d{4}-\d{2}-\d{2})/)||[])[1];
    return !it.checked&&d&&d>=t&&d<=horizon;
  }).sort((a,b)=>a.body.localeCompare(b.body)):[];
  if(!events.length)empty(c1,'Nothing scheduled through '+horizon+'. If that\'s wrong, dump it — dates are sacred here.');
  events.forEach(it=>{
    const d=(it.body.match(/(\d{4}-\d{2}-\d{2})( \d{2}:\d{2})?/)||[]);
    const label=d[1]===t?`<span class="today-badge">TODAY${d[2]||''}</span>`:d[0];
    c1.appendChild(itemHTML(it,'data/calendar.md',label));
  });

  // today's plan (daily note)
  body.insertAdjacentHTML('beforeend','<div class="sec">Today\'s Plan</div>');
  const c2=card();body.appendChild(c2);
  if(!daily){empty(c2,'No plan yet. Run <b>/daily</b> in Claude — it sorts every pending dump and hands you Top 3 + first move.');}
  else{
    const wrap=document.createElement('div');wrap.className='note';
    for(const raw of daily.text.split('\n')){
      const line=raw.replace(/\r$/,'');
      const m=line.match(/^- \[( |x)\] (.*)$/);
      if(m){wrap.appendChild(itemHTML({line,checked:m[1]==='x',body:m[2]},`daily/${t}.md`));continue;}
      const el=document.createElement('div');
      if(line.startsWith('# ')){el.className='h1';el.textContent=line.slice(2);}
      else if(line.startsWith('## ')){el.className='h2';el.textContent=line.slice(3);}
      else if(line.startsWith('- ')){el.className='bullet';el.textContent='• '+line.slice(2);}
      else el.innerHTML=esc(line).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
      wrap.appendChild(el);
    }
    c2.appendChild(wrap);
  }

  // due follow-ups
  body.insertAdjacentHTML('beforeend','<div class="sec">Due Follow-ups</div>');
  const c3=card();body.appendChild(c3);
  const due=loops?parseChecklist(loops.text).filter(it=>{
    const n=meta(it.body,'nudge');return !it.checked&&n&&n<=t;
  }):[];
  if(!due.length)empty(c3,'Nothing due. The system is holding your loops — head clear.');
  due.forEach(it=>{
    const bits=[];
    const w=meta(it.body,'waiting-on');if(w)bits.push('waiting on '+w);
    const od=Math.round((new Date(t)-new Date(meta(it.body,'nudge')))/864e5);
    if(od>=3)bits.push(`<span class="pri1">⚠ ${od} days overdue</span>`);
    c3.appendChild(itemHTML(it,'data/loops.md',bits.join(' · ')));
  });

  // habit streaks
  if(habits){
    const hs=habits.text.split('\n').map(l=>l.match(/^- ([^|]+)\|.*streak:(\d+)/)).filter(Boolean);
    if(hs.length){
      body.insertAdjacentHTML('beforeend','<div class="sec">Streaks</div>');
      const chips=document.createElement('div');chips.className='chips';
      hs.forEach(h=>chips.insertAdjacentHTML('beforeend',`<div class="chip">${esc(h[1].trim())} <b>${h[2]}🔥</b></div>`));
      body.appendChild(chips);
    }
  }
}

/* ---- TASKS ---- */
async function renderTasks(){
  const body=$('tasks-body');body.innerHTML='<div class="loading">Loading…</div>';
  const f=await getFile('data/tasks.md');body.innerHTML='';
  const open=f?parseChecklist(f.text).filter(it=>!it.checked):[];
  $('task-count').textContent=open.length?open.length+' open':'all clear';
  if(!open.length){const c=card();body.appendChild(c);empty(c,'No open tasks. Either you\'re on top of it, or the dumps aren\'t happening.');return;}
  const bySec={};open.forEach(it=>{(bySec[it.section||'Other']=bySec[it.section||'Other']||[]).push(it);});
  for(const[sec,items]of Object.entries(bySec)){
    body.insertAdjacentHTML('beforeend',`<div class="sec">${esc(sec)}</div>`);
    const c=card();body.appendChild(c);
    items.sort((a,b)=>(meta(a.body,'pri')||'9').localeCompare(meta(b.body,'pri')||'9'));
    items.forEach(it=>{
      const pri=meta(it.body,'pri'),due=meta(it.body,'due');
      const bits=[];
      if(pri==='1')bits.push('<span class="pri1">priority</span>');
      if(due)bits.push(due<=todayStr()?'<span class="pri1">due '+due+'</span>':'due '+due);
      c.appendChild(itemHTML(it,'data/tasks.md',bits.join(' · ')));
    });
  }
}

/* ---- LOOPS ---- */
async function renderLoops(){
  const body=$('loops-body');body.innerHTML='<div class="loading">Loading…</div>';
  const f=await getFile('data/loops.md');body.innerHTML='';
  const open=f?parseChecklist(f.text).filter(it=>!it.checked):[];
  if(!open.length){const c=card();body.appendChild(c);empty(c,'No open loops. Rare state — enjoy it.');return;}
  const bySec={};open.forEach(it=>{(bySec[it.section||'Other']=bySec[it.section||'Other']||[]).push(it);});
  for(const[sec,items]of Object.entries(bySec)){
    body.insertAdjacentHTML('beforeend',`<div class="sec">${esc(sec)}</div>`);
    const c=card();body.appendChild(c);
    items.forEach(it=>{
      const bits=[];
      const w=meta(it.body,'waiting-on');if(w)bits.push('waiting on '+w);
      const n=meta(it.body,'nudge');
      if(n){
        const od=Math.round((new Date(todayStr())-new Date(n))/864e5);
        if(od>=3)bits.push(`<span class="pri1">⚠ ${od} days overdue — chase it or kill it</span>`);
        else if(od>=0)bits.push('<span class="pri1">nudge due</span>');
        else bits.push('nudge '+n);
      }
      c.appendChild(itemHTML(it,'data/loops.md',bits.join(' · ')));
    });
  }
}

/* ---- CALENDAR (month grid + day agenda) ---- */
let calMonth=null,calSel=null,calEvs=[];
const evDate=it=>(it.body.match(/(\d{4}-\d{2}-\d{2})/)||[])[1];
const evTime=it=>((it.body.match(/\d{4}-\d{2}-\d{2} (\d{2}:\d{2})/)||[])[1])||'';

function drawCal(){
  const body=$('cal-body');body.innerHTML='';
  const t=todayStr();
  const y=calMonth.getFullYear(),m=calMonth.getMonth();
  const p=n=>String(n).padStart(2,'0');
  const byDay={};calEvs.forEach(it=>{const d=evDate(it);(byDay[d]=byDay[d]||[]).push(it);});

  // header
  body.insertAdjacentHTML('beforeend',`<div class="cal-head">
    <button id="cal-prev">‹</button>
    <div class="mon">${calMonth.toLocaleDateString(undefined,{month:'long',year:'numeric'})}</div>
    <button id="cal-next">›</button></div>`);

  // grid
  const grid=document.createElement('div');grid.className='cal-grid';
  ['S','M','T','W','T','F','S'].forEach(d=>grid.insertAdjacentHTML('beforeend',`<div class="dow">${d}</div>`));
  const first=new Date(y,m,1),days=new Date(y,m+1,0).getDate();
  for(let i=0;i<first.getDay();i++)grid.insertAdjacentHTML('beforeend','<div></div>');
  for(let d=1;d<=days;d++){
    const ds=`${y}-${p(m+1)}-${p(d)}`;
    const cell=document.createElement('button');
    cell.className='cal-cell'+(ds===t?' today':'')+(ds===calSel?' sel':'')+(byDay[ds]&&ds<t?' past-due':'');
    cell.innerHTML=`${d}${byDay[ds]?'<span class="dot"></span>':''}`;
    cell.onclick=()=>{calSel=ds;drawCal();};
    grid.appendChild(cell);
  }
  body.appendChild(grid);
  $('cal-prev').onclick=()=>{calMonth=new Date(y,m-1,1);drawCal();};
  $('cal-next').onclick=()=>{calMonth=new Date(y,m+1,1);drawCal();};

  // selected day agenda
  const selDate=new Date(calSel+'T00:00');
  body.insertAdjacentHTML('beforeend',`<div class="day-title">${selDate.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})}${calSel===t?' — today':''}</div>`);
  const c=card();body.appendChild(c);
  const items=(byDay[calSel]||[]).sort((a,b)=>evTime(a).localeCompare(evTime(b)));
  if(!items.length)empty(c,'Nothing this day.');
  items.forEach(it=>{
    const late=calSel<t?'<span class="pri1">past — reschedule or check off</span>':evTime(it);
    c.appendChild(itemHTML(it,'data/calendar.md',late));
  });

  // upcoming agenda (next 30 days)
  const horizon=plusDays(30);
  const upcoming=calEvs.filter(it=>{const d=evDate(it);return d>=t&&d<=horizon;})
    .sort((a,b)=>a.body.localeCompare(b.body));
  const missed=calEvs.filter(it=>evDate(it)<t);
  if(missed.length){
    body.insertAdjacentHTML('beforeend','<div class="sec">Missed — decide</div>');
    const mc=card();body.appendChild(mc);
    missed.forEach(it=>mc.appendChild(itemHTML(it,'data/calendar.md',`<span class="pri1">was ${evDate(it)}</span>`)));
  }
  body.insertAdjacentHTML('beforeend','<div class="sec">Next 30 Days</div>');
  const uc=card();body.appendChild(uc);
  if(!upcoming.length)empty(uc,'Nothing coming up. Dump anything with a date and it lands here.');
  let lastD='';
  upcoming.forEach(it=>{
    const d=evDate(it);
    const label=(d!==lastD?new Date(d+'T00:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}):'')+(evTime(it)?' '+evTime(it):'');
    lastD=d;
    uc.appendChild(itemHTML(it,'data/calendar.md',d===t?`<span class="today-badge">TODAY</span>${evTime(it)?' '+evTime(it):''}`:label));
  });
}

async function renderCal(){
  const body=$('cal-body');body.innerHTML='<div class="loading">Loading…</div>';
  const f=await getFile('data/calendar.md');
  calEvs=f?parseChecklist(f.text).filter(it=>!it.checked&&it.body.match(/\d{4}-\d{2}-\d{2}/)):[];
  $('cal-count').textContent=calEvs.length?calEvs.length+' scheduled':'';
  if(!calMonth){calMonth=new Date();calMonth.setDate(1);calSel=todayStr();}
  drawCal();
}

/* ---- nav ---- */
const renderers={today:renderToday,tasks:renderTasks,loops:renderLoops,cal:renderCal};
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('nav button').forEach(x=>x.classList.toggle('on',x===b));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  $('v-'+b.dataset.v).classList.add('active');
  if(renderers[b.dataset.v]){if(!token())return;renderers[b.dataset.v]();}
});

if(localStorage.getItem('gh_token'))refreshPending();
</script>
</body>
</html>
